# OpenClaw — Coolify deployment compose file
#
# This compose file builds a custom image on top of the official upstream
# OpenClaw release (see Dockerfile). It uses named volumes so data persists
# across redeploys and image upgrades.
#
# Required env vars (set in Coolify UI → Environment Variables):
#   OPENCLAW_GATEWAY_TOKEN  — auth token for the Control UI + API
#
# Ports:
#   18789  — Gateway (API + Web UI)
#   18790  — Bridge (ACP / IDE integrations)

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      # Startup optimisation — cache compiled bytecode + skip CLI self-respawn
      NODE_COMPILE_CACHE: /var/tmp/openclaw-compile-cache
      OPENCLAW_NO_RESPAWN: "1"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?Set OPENCLAW_GATEWAY_TOKEN in Coolify env vars}
      OPENCLAW_DOMAIN: ${SERVICE_FQDN_OPENCLAW_GATEWAY:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      # Gemini API key — used for memory search embeddings
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # GitHub CLI (gh) auth — fine-grained PAT or classic token
      GH_TOKEN: ${GH_TOKEN:-}
      # Browserless CDP URL — points at the companion container, with auth token
      BROWSERLESS_CDP_URL: http://browserless:3000?token=${BROWSERLESS_TOKEN:-openclaw-local}
    volumes:
      - openclaw-home:/home/node
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    depends_on:
      browserless:
        condition: service_healthy
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Browserless — headless Chromium with CDP ───────────────────
  # Provides a remote CDP endpoint that OpenClaw connects to for
  # browser automation (snapshots, screenshots, click/type, etc.).
  # Docs: https://docs.browserless.io/
  browserless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      # Browserless token — set in Coolify env vars or leave default
      TOKEN: ${BROWSERLESS_TOKEN:-openclaw-local}
      # Connection and concurrency settings
      CONCURRENT: ${BROWSERLESS_CONCURRENT:-2}
      QUEUED: ${BROWSERLESS_QUEUED:-5}
      TIMEOUT: ${BROWSERLESS_TIMEOUT:-120000}
      # Health check endpoint
      HEALTH: "true"
    # No host port needed — OpenClaw reaches Browserless via the
    # internal Docker network (http://browserless:3000).
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:3000/pressure?token=$$TOKEN",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  openclaw-config:
  openclaw-workspace:
